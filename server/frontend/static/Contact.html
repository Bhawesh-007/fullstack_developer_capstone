<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="/static/bootstrap.min.css">
    
    <title>Contact Us</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        .main-container {
            width: 80%;
            margin: 40px auto;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .container1 {
    width: 100%;
    height: 300px;
    display: flex;
    
    overflow: hidden;
}

.container1 img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    
}

        .container2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 30px;
        }

        .left, .right {
            background: #fafafa;
            padding: 20px;
            border-radius: 8px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
        }

        textarea {
            resize: none;
            height: 120px;
        }

        button {
            padding: 10px 15px;
            border: none;
            background: black;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #333;
        }

        @media (max-width: 768px) {
            .container2 {
                grid-template-columns: 1fr;
            }

            .main-container {
                width: 95%;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light" style="background-color:darkturquoise; height: 1in;">
      <div class="container-fluid">
        <h2 style="padding-right: 5%;">Dealerships</h2>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText" aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarText">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" style="font-size: larger;" aria-current="page" href="/">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" style="font-size: larger;" href="/about">About Us</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" style="font-size: larger;" href="/contact">Contact Us</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    
    <div class="main-container">

        <!-- Top Image -->
        <div class="container1">
            <img src="/static/contactus.png" alt="Contact Image">
            <img src="/static/cars.jpeg" alt="">
        </div>

        <!-- Bottom Grid -->
        <div class="container2">

            <!-- Left -->
            <div class="left">
                <h2>Contact Us</h2>

                <form action="#" method="post">
                    <input type="text" name="name" placeholder="Your Name">
                    <input type="email" name="email" placeholder="Your Email">
                    <textarea name="message" placeholder="Your Message"></textarea>
                    <button type="submit">Send</button>
                </form>
            </div>

            <!-- Right -->
            <div class="right">
                <h2>Our Information</h2>
                <p>Email: support@example.com</p>
                <p>Phone: +91 XXXXX XXXXX</p>
                <p>Address: Mumbai, India</p>
            </div>

        </div>

    </div>

</body>
</html>
